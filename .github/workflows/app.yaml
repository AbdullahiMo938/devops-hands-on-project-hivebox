name: App CI-CD

on:
  push:
    branches: ["main"]
    paths-ignore:
      - 'terraform/**'

  pull_request:
    branches: ["main"]
    paths-ignore:
      - 'terraform/**'

jobs:

# -------------------------
# 1. BUILD + TEST
# -------------------------
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Node setup
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Lint
      - name: Lint
        run: npm run lint

      # Tests
      - name: Test
        run: npm test

      # Build Docker image
      - name: Build Docker image
        run: docker build -t hivebox:${{ github.sha }} .

      # Save image as artifact
      - name: Save Docker image
        run: docker save -o hivebox.tar hivebox:${{ github.sha }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: hivebox.tar


# -------------------------
# 2. SECURITY CHECK
# -------------------------
  scorecard:
    runs-on: ubuntu-latest

    permissions:
      security-events: write
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: OpenSSF Scorecard
        uses: ossf/scorecard-action@v2.4.0
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


# -------------------------
# 3. PUSH IMAGE
# -------------------------
  release-to-registry:
    needs: build-and-test
    runs-on: ubuntu-latest

    permissions:
      packages: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: version
        run: echo "VERSION=$(jq -r .version package.json)" >> $GITHUB_OUTPUT

      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image

      - name: Load Docker image
        run: docker load -i hivebox.tar

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag & Push image
        run: |
          IMAGE_ID=ghcr.io/${{ github.repository }}/hivebox
          IMAGE_ID=${IMAGE_ID,,}

          docker tag hivebox:${{ github.sha }} $IMAGE_ID:${{ steps.version.outputs.VERSION }}
          docker tag hivebox:${{ github.sha }} $IMAGE_ID:latest

          docker push $IMAGE_ID:${{ steps.version.outputs.VERSION }}
          docker push $IMAGE_ID:latest


# -------------------------
# 4. DEPLOY TO EKS
# -------------------------
  deploy:
    needs: release-to-registry
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # AWS login
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-2

      # Connect to EKS
      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region eu-west-2 \
            --name hivebox-london-cluster

      # Helm setup
      - name: Setup Helm
        uses: azure/setup-helm@v4

      # Deploy
      - name: Deploy with Helm
        run: |
          helm upgrade --install hivebox ./charts/hivebox \
            --set image.repository=ghcr.io/${{ github.repository }}/hivebox \
            --set image.tag=${{ github.sha }}